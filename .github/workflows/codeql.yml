name: "CodeQL"
on:
  push:
  pull_request:

# The workflow needs the security-events permission to upload SARIF results
permissions:
  contents: read
  security-events: write

jobs:
  check:
    name: Check for workflow file changes
    runs-on: ubuntu-latest
    outputs:
      workflows_changed: ${{ steps.check.outputs.workflows_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        name: Check workflow changes
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA=$(jq -r .pull_request.base.sha "$GITHUB_EVENT_PATH")
            echo "Base SHA: $BASE_SHA"
            git fetch origin "$BASE_SHA" || true
            CHANGED=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" || true)
            echo "Changed files:\n$CHANGED"
            if echo "$CHANGED" | grep -E '^.github/workflows/' >/dev/null; then
              echo "workflows_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "workflows_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "workflows_changed=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze
    needs: check
    if: needs.check.outputs.workflows_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  skip-warning:
    name: Skip notification if workflows changed
    needs: check
    if: needs.check.outputs.workflows_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: |
          echo "Workflows changed in the pull request; skipping CodeQL analysis to avoid privileged upload failures."
